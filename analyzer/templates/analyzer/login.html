{% extends 'analyzer/base.html' %}
{% load static %}

{% block content %}
<div class="auth-bg d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg auth-card glassmorphism">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="auth-icon bg-primary-light text-primary-custom mx-auto mb-3">
                                <i class="fa-solid fa-lock fa-2x"></i>
                            </div>
                            <h2 class="fw-bold font-heading">Welcome Back</h2>
                            <p class="text-muted">Login to analyze your skill gap</p>
                        </div>
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-semibold text-muted small text-uppercase">Email
                                    Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i
                                            class="fa-solid fa-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" name="email"
                                        placeholder="name@example.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold text-muted small text-uppercase">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i
                                            class="fa-solid fa-key"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" name="password"
                                        placeholder="••••••••" required>
                                </div>
                            </div>
                            <button type="submit"
                                class="btn btn-primary-custom w-100 py-2 fw-bold text-white mb-3 shadow-sm auth-btn">Log
                                In</button>
                        </form>
                        <div class="text-center">
                            <p class="text-muted small mb-0">Don't have an account? <a href="{% url 'register' %}"
                                    class="text-primary-custom fw-semibold text-decoration-none">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
